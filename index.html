<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>StudyCam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>StudyCam</h1>
  </header>

  <main id="app">

    <!-- HOME -->
    <section id="home">
      <h2>Dashboard</h2>

      <div class="stats">
        <div>Fotos: <span id="totalFotos">0</span></div>
        <div>Matérias: <span id="totalMaterias">0</span></div>
      </div>

      <div id="listaAnotacoes"></div>

      <button id="btnCapturar">Capturar Anotação</button>
    </section>
  <input type="text" id="busca" placeholder="Buscar...">

    <div id="slideshow">
      <img id="slide" src="img1.jpg" width="200">
      <br>
      <button onclick="anterior()">Anterior</button>
      <button onclick="proximo()">Próximo</button>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
